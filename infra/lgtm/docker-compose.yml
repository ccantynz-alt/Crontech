# ── Crontech Observability: LGTM Stack ──────────────────────────────
# Loki  — log aggregation
# Grafana — dashboards & visualization
# Tempo — distributed tracing
# Mimir — metrics storage
# OTel Collector — single ingestion point for everything
#
# Defaults:
#   - All services bound to 127.0.0.1; front with Caddy for public access
#   - Persistent volumes under ./data (gitignored)
#   - Config under ./config
#   - No passwords shipped — Grafana admin password is baked in at first boot
#     and MUST be rotated before going public (see grafana/provisioning below)
#
# Bring up:
#   docker compose up -d
# Tear down (preserves data):
#   docker compose down
# Wipe everything:
#   docker compose down -v

version: "3.9"

name: crontech-lgtm

networks:
  lgtm:
    driver: bridge

volumes:
  loki_data:
  grafana_data:
  tempo_data:
  mimir_data:
  otel_data:

services:
  # ── Loki: log aggregation ─────────────────────────────────────────
  loki:
    image: grafana/loki:3.2.1
    container_name: crontech-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./config/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - lgtm
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Tempo: distributed tracing ────────────────────────────────────
  tempo:
    image: grafana/tempo:2.6.1
    container_name: crontech-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./config/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "127.0.0.1:3200:3200"    # tempo HTTP
      - "127.0.0.1:4317:4317"    # OTLP gRPC
      - "127.0.0.1:4318:4318"    # OTLP HTTP
    networks:
      - lgtm
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3200/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Mimir: metrics storage ────────────────────────────────────────
  mimir:
    image: grafana/mimir:2.14.2
    container_name: crontech-mimir
    restart: unless-stopped
    command: ["-config.file=/etc/mimir/mimir.yaml"]
    volumes:
      - ./config/mimir/mimir.yaml:/etc/mimir/mimir.yaml:ro
      - mimir_data:/data
    ports:
      - "127.0.0.1:9009:9009"
    networks:
      - lgtm
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9009/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Grafana: dashboards ───────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.1
    container_name: crontech-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-ROTATE_ME_BEFORE_PROD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_ALLOW_ORG_CREATE=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_SERVER_ROOT_URL=${GF_ROOT_URL:-http://localhost:3000}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - lgtm
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
      mimir:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── OTel Collector: unified ingestion ─────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.112.0
    container_name: crontech-otel
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./config/otel/config.yaml:/etc/otel/config.yaml:ro
      - otel_data:/var/lib/otel
    ports:
      - "127.0.0.1:4319:4317"    # OTLP gRPC (public ingest, remapped)
      - "127.0.0.1:4320:4318"    # OTLP HTTP (public ingest, remapped)
      - "127.0.0.1:8888:8888"    # collector metrics
    networks:
      - lgtm
    depends_on:
      - loki
      - tempo
      - mimir
