# ── Edge Worker Configuration ─────────────────────────────────────────
# Local wrangler.toml for development convenience.
# Production config lives at infra/cloudflare/wrangler.toml.

name = "btf-edge-worker"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[placement]
mode = "smart"

[vars]
ENVIRONMENT = "development"
API_VERSION = "0.0.1"
API_ORIGIN = "http://localhost:3001"

[[d1_databases]]
binding = "DB"
database_name = "btf-dev"
database_id = "YOUR_D1_DATABASE_ID"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "btf-assets-dev"

[[kv_namespaces]]
binding = "CACHE"
id = "YOUR_KV_NAMESPACE_ID"

[durable_objects]
bindings = [
  { name = "RATE_LIMITER", class_name = "RateLimiter" },
  { name = "COLLAB_ROOM", class_name = "CollabRoom" },
]

[[migrations]]
tag = "v1"
new_classes = ["CollabRoom", "RateLimiter"]

[ai]
binding = "AI"

[dev]
port = 3002
local_protocol = "http"
